name: MSRV

on:
  push:
    branches: ["main"]
  pull_request:

env:
  MSRV: 1.88.0

jobs:
  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace --all-targets --all-features
